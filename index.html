<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aristokrat Yig'ish</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>
    <div id="app">
        <header><h1>Aristokrat Yig'ish</h1></header>
        <main>
            <button id="btn-start-scan" class="btn btn-primary btn-large">Skanerlashni boshlash</button>
            
            <div id="reader-container" class="hidden">
                <div id="reader"></div>
                <button class="btn btn-danger btn-large mt-10" onclick="stopScanner()">Bekor qilish</button>
            </div>

            <div id="result-container" class="hidden">
                <div class="result-card">
                    <h2 id="modul-title"></h2>
                    <div class="actions">
                        <button id="btn-furnitura" class="btn btn-tab active">Furnitura</button>
                        <button id="btn-pdf" class="btn btn-tab btn-media hidden">Chizma</button>
                        <button id="btn-video" class="btn btn-tab btn-media hidden">Video</button>
                    </div>
                    <div id="content-area" class="scrollable"></div>
                </div>
                <button class="btn btn-primary btn-large mt-10" onclick="resetApp()">Yangi skanerlash</button>
            </div>
        </main>
    </div>

    <div id="fullscreen-modal" class="hidden">
        <div class="modal-header">
            <h3 id="modal-title-text">Hujjat</h3>
            <button class="btn btn-danger" onclick="closeFullscreen()">Yopish (X)</button>
        </div>
        <div id="modal-body">
            <div id="anti-leak-shield" class="hidden"></div>
            <div id="iframe-container"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
