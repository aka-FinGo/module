name: Build Android APK (Capacitor)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodni olish
        uses: actions/checkout@v4

      - name: Java 17 o'rnatish
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Node.js o'rnatish
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Android SDK muhit o'zgaruvchilari
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "/usr/local/lib/android/sdk/platform-tools" >> $GITHUB_PATH

      - name: www papkasini tayyorlash
        run: |
          mkdir -p www
          cp index.html style.css app.js sw.js manifest.json www/
          cp icon-192.png icon-512.png www/ 2>/dev/null || true

      - name: Capacitor o'rnatish
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: capacitor.config.json yaratish
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "uz.aristokrat.yigish",
            "appName": "Aristokrat Yigish",
            "webDir": "www",
            "android": {
              "allowMixedContent": true
            }
          }
          EOF

      - name: Android platformasini qo'shish va sync
        run: |
          npx cap add android
          npx cap sync android

      - name: MainActivity.java - FLAG_SECURE
        run: |
          FILE=$(find android -name "MainActivity.java" | head -1)
          cat > "$FILE" << 'EOF'
package uz.aristokrat.yigish;

import com.getcapacitor.BridgeActivity;
import android.os.Bundle;
import android.view.WindowManager;

public class MainActivity extends BridgeActivity {
    @Override
    public void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        getWindow().setFlags(
            WindowManager.LayoutParams.FLAG_SECURE,
            WindowManager.LayoutParams.FLAG_SECURE
        );
    }
}
EOF

      - name: AndroidManifest - CAMERA ruxsati
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "CAMERA" "$MANIFEST"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.CAMERA" />\n</manifest>|' "$MANIFEST"
          fi

      - name: build.gradle - ARM64 abiFilters
        run: |
          python3 - << 'PYEOF'
with open("android/app/build.gradle", "r") as f:
    content = f.read()
if "abiFilters" not in content:
    ndk = '\n        ndk {\n            abiFilters "arm64-v8a", "armeabi-v7a"\n        }'
    content = content.replace("defaultConfig {", "defaultConfig {" + ndk, 1)
    with open("android/app/build.gradle", "w") as f:
        f.write(content)
    print("build.gradle yangilandi")
else:
    print("abiFilters allaqachon bor")
PYEOF

      - name: APK Build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: APK yuklash
        uses: actions/upload-artifact@v4
        with:
          name: aristokrat-yigish-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
