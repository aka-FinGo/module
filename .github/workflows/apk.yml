name: Build Android APK (Capacitor)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repozitoriydan kodni olish
        uses: actions/checkout@v4

      - name: Java 17 o'rnatish
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Node.js o'rnatish
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Veb fayllarni tayyorlash (www papkasi)
        run: |
          mkdir -p www
          cp index.html style.css app.js sw.js manifest.json www/ 2>/dev/null || true
          cp *.png www/ 2>/dev/null || true

      - name: Capacitor o'rnatish va sozlash
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "Aristokrat Yigish" "uz.aristokrat.yigish" --web-dir "www"
          npx cap add android
          npx cap sync android

      - name: Android tizim sozlamalari va Skrinshot himoyasi
        run: |
          # 1. Manifestga kamera ruxsatini qo'shish
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.CAMERA" />|' $MANIFEST_PATH

          # 2. MainActivity.java faylini FLAG_SECURE bilan noldan yozish
          FILE_PATH=$(find android -name "MainActivity.java" | head -1)
          echo "File topildi: $FILE_PATH"
          cat > "$FILE_PATH" << 'JAVAEOF'
package uz.aristokrat.yigish;

import com.getcapacitor.BridgeActivity;
import android.os.Bundle;
import android.view.WindowManager;

public class MainActivity extends BridgeActivity {
    @Override
    public void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        getWindow().setFlags(
            WindowManager.LayoutParams.FLAG_SECURE,
            WindowManager.LayoutParams.FLAG_SECURE
        );
    }
}
JAVAEOF

          # 3. ARM64 arxitekturasini sozlash (to'g'ri multiline)
          GRADLE_APP_PATH="android/app/build.gradle"
          sed -i '/defaultConfig {/a\        ndk {\n            abiFilters "arm64-v8a", "armeabi-v7a"\n        }' $GRADLE_APP_PATH

      - name: Android SDK versiyalarini tekshirish
        run: |
          cat android/app/build.gradle | grep -E "compileSdk|minSdk|targetSdk"

      - name: APK ni yig'ish (Build Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: APK ni yuklash (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: aristokrat-yigish-final-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
