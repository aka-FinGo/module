name: Build Android APK (Capacitor)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodni olish
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: www papkasini tayyorlash
        run: |
          mkdir -p www
          cp index.html style.css app.js sw.js manifest.json www/
          cp icon-192.png icon-512.png www/ 2>/dev/null || true

      - name: Capacitor ornatish
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: capacitor.config.json yaratish
        run: printf '{"appId":"uz.aristokrat.yigish","appName":"Aristokrat Yigish","webDir":"www","android":{"allowMixedContent":true}}' > capacitor.config.json

      - name: Android platformasi
        run: |
          npx cap add android
          npx cap sync android

      - name: MainActivity.java - FLAG_SECURE
        run: |
          FILE=$(find android -name "MainActivity.java" | head -1)
          printf 'package uz.aristokrat.yigish;\n\nimport com.getcapacitor.BridgeActivity;\nimport android.os.Bundle;\nimport android.view.WindowManager;\n\npublic class MainActivity extends BridgeActivity {\n    @Override\n    public void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n        getWindow().setFlags(WindowManager.LayoutParams.FLAG_SECURE, WindowManager.LayoutParams.FLAG_SECURE);\n    }\n}\n' > "$FILE"
          echo "MainActivity yazildi: $FILE"

      - name: AndroidManifest - CAMERA ruxsati
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          grep -q "CAMERA" "$MANIFEST" || sed -i 's|</manifest>|    <uses-permission android:name="android.permission.CAMERA" />\n</manifest>|' "$MANIFEST"

      - name: build.gradle - ARM64
        run: |
          GRADLE="android/app/build.gradle"
          grep -q "abiFilters" "$GRADLE" || sed -i '/defaultConfig {/a\\        ndk {\n            abiFilters "arm64-v8a", "armeabi-v7a"\n        }' "$GRADLE"

      - name: APK Build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: APK yuklash
        uses: actions/upload-artifact@v4
        with:
          name: aristokrat-yigish-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
